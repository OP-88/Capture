name: capture
base: core22
version: "2.0.2"
summary: Local-first screenshot enhancement and library tool
description: |
  Capture is a forensic-grade desktop application for security professionals
  that enhances screenshot quality, sanitizes PII, and maintains chain-of-custody.

license: MIT
website: https://github.com/verba-mvp/capture
source-code: https://github.com/verba-mvp/capture
issues: https://github.com/verba-mvp/capture/issues

grade: stable
confinement: strict

architectures:
  - build-on: amd64
  - build-on: arm64

apps:
  capture:
    command: bin/capture-launcher
    desktop: snap/gui/capture.desktop
    startup-notify: true
    plugs:
      - home
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - opengl
      - removable-media
    environment:
      # Core22 uses python 3.10
      PYTHONPATH: $SNAP/lib/python3.10/site-packages:$SNAP/usr/lib/python3/dist-packages
      PATH: $SNAP/bin:$SNAP/usr/bin:$PATH
      LD_LIBRARY_PATH: $SNAP/usr/lib/$SNAPCRAFT_ARCH_TRIPLET:$LD_LIBRARY_PATH
      TESSDATA_PREFIX: $SNAP/usr/share/tesseract-ocr/4.00/tessdata
      MAGIC: $SNAP/usr/lib/file/magic.mgc
      # Enable Wayland and HiDPI scaling to fix blurriness
      QT_QPA_PLATFORM: "wayland;xcb"
      QT_AUTO_SCREEN_SCALE_FACTOR: "0"
      QT_ENABLE_HIGHDPI_SCALING: "1"
      QT_SCALE_FACTOR_ROUNDING_POLICY: "PassThrough"

  diagnose:
    command: bin/diagnose-launcher
    plugs:
      - home
      - desktop
      - x11
    environment:
      PYTHONPATH: $SNAP/lib/python3.10/site-packages:$SNAP/usr/lib/python3/dist-packages
      PATH: $SNAP/bin:$SNAP/usr/bin:$PATH
      LD_LIBRARY_PATH: $SNAP/usr/lib/$SNAPCRAFT_ARCH_TRIPLET:$LD_LIBRARY_PATH
      TESSDATA_PREFIX: $SNAP/usr/share/tesseract-ocr/4.00/tessdata
      MAGIC: $SNAP/usr/lib/file/magic.mgc
      QT_QPA_PLATFORM: "wayland;xcb"

parts:
  capture:
    plugin: python
    source: .
    python-packages:
      - . # Installs via setup.py
    build-environment:
      - PIP_NO_CACHE_DIR: "true"
      - PIP_PREFER_BINARY: "1"
    build-packages:
      - python3-dev
      - python3-pip
      - git
    stage-packages:
      - libgl1
      - libegl1
      - libxkbcommon-x11-0
      - libdbus-1-3
      - libxcb-icccm4
      - libxcb-image0
      - libxcb-keysyms1
      - libxcb-randr0
      - libxcb-render-util0
      - libxcb-xinerama0
      - libxcb-cursor0
      - libxcb-shape0
      - libxcb-xfixes0
      - qt6-wayland
      - tesseract-ocr
      - tesseract-ocr-eng
      - libmagic1
      - libmagic-mgc
      - file

  launcher:
    plugin: dump
    source: .
    override-build: |
      # Copy the icon to standard locations
      mkdir -p $CRAFT_PART_INSTALL/meta/gui
      cp $CRAFT_PART_SRC/capture_icon.png $CRAFT_PART_INSTALL/meta/gui/capture.png
      
      # Also copy to usr/share/icons for broader compatibility
      mkdir -p $CRAFT_PART_INSTALL/usr/share/icons/hicolor/256x256/apps
      mkdir -p $CRAFT_PART_INSTALL/usr/share/icons/hicolor/512x512/apps
      cp $CRAFT_PART_SRC/capture_icon.png $CRAFT_PART_INSTALL/usr/share/icons/hicolor/512x512/apps/capture.png
      mkdir -p $CRAFT_PART_INSTALL/usr/share/icons/hicolor/128x128/apps
      cp $CRAFT_PART_SRC/capture_icon.png $CRAFT_PART_INSTALL/usr/share/icons/hicolor/128x128/apps/capture.png
      cp $CRAFT_PART_SRC/capture_icon.png $CRAFT_PART_INSTALL/usr/share/icons/hicolor/256x256/apps/capture.png

      # Create launcher script
      mkdir -p $CRAFT_PART_INSTALL/bin
      cat > $CRAFT_PART_INSTALL/bin/capture-launcher << 'EOF'
      #!/bin/bash
      export PYTHONPATH="$SNAP/lib/python3.10/site-packages:$SNAP/usr/lib/python3/dist-packages"
      # Use the snap's python3 (which points to 3.10 in core22)
      exec "$SNAP/bin/python3" "$SNAP/bin/run" "$@"
      EOF
      chmod +x $CRAFT_PART_INSTALL/bin/capture-launcher

      # Create diagnose launcher
      cat > $CRAFT_PART_INSTALL/bin/diagnose-launcher << 'EOF'
      #!/bin/bash
      export PYTHONPATH="$SNAP/lib/python3.10/site-packages:$SNAP/usr/lib/python3/dist-packages"
      exec "$SNAP/bin/python3" "$SNAP/bin/diagnose" "$@"
      EOF
      chmod +x $CRAFT_PART_INSTALL/bin/diagnose-launcher
